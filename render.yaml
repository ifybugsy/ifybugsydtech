services:
  - type: web
    name: ifybugsy-backend
    runtime: node
    buildCommand: cd backend && pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: cd backend && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        fromService:
          type: web
          name: ifybugsy-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 24h
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: web
    name: ifybugsy-frontend
    runtime: node
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: ifybugsy-backend
          envVarKey: RENDER_EXTERNAL_URL
